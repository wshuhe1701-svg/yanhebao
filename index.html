<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shared Growth Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="card" id="app">
        <section id="loginView" class="view">
          <header class="intro">
            <p class="eyebrow">Private Two-Person Space</p>
            <h1>Shared Growth Sanctuary</h1>
            <p class="subtle">
              A quiet and intentional space to reflect, build discipline, and
              grow side-by-side.
            </p>
          </header>

          <form id="loginForm" class="login-form">
            <label class="field">
              <span>Username</span>
              <input type="text" id="username" autocomplete="username" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input
                type="password"
                id="password"
                autocomplete="current-password"
                required
              />
            </label>
            <button type="submit" class="btn-primary">Enter Space</button>
            <p id="loginError" class="error"></p>
          </form>
          <div id="credentialHint" class="hint"></div>
        </section>

        <section id="dashboardView" class="view hidden">
          <header class="topbar">
            <div>
              <p class="eyebrow">Shared Daily Dashboard</p>
              <h2 id="welcomeTitle">Welcome</h2>
            </div>
            <button id="logoutBtn" class="btn-ghost">Log out</button>
          </header>

          <section class="composer">
            <h3>Record Today's Progress</h3>
            <form id="entryForm">
              <div class="row">
                <label class="field">
                  <span>Section</span>
                  <select id="section" required>
                    <option value="Body">Body</option>
                    <option value="Mind">Mind</option>
                    <option value="Career">Career</option>
                  </select>
                </label>
                <label class="field">
                  <span>Date</span>
                  <input type="date" id="day" required />
                </label>
              </div>
              <label class="field">
                <span>Update</span>
                <textarea
                  id="content"
                  rows="5"
                  placeholder="Write an honest, concise update..."
                  required
                ></textarea>
              </label>
              <button type="submit" class="btn-primary">Save Update</button>
            </form>
          </section>

          <section class="board">
            <h3>Shared Entries</h3>
            <p class="subtle">
              Both of your updates appear here in real time.
            </p>
            <div id="sectionsContainer" class="sections-grid"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
